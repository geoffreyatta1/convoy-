kind = "mobile"
previewPath = "/"
title = "Family Convoy Navigator"
version = "1.0.0"
id = "artifacts/mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/" ]
localPort = 18115

[services.development]
run = "pnpm --filter @workspace/mobile run dev"

[services.production]

[services.production.build]
args = ["sh", "-c", "pnpm run typecheck:libs && pnpm --filter @workspace/mobile run lint && pnpm --filter @workspace/mobile run typecheck && pnpm --filter @workspace/mobile run build"]

[services.production.run]
args = ["pnpm", "--filter", "@workspace/mobile", "run", "serve"]

[services.env]
PORT = "18115"
BASE_PATH = "/"
